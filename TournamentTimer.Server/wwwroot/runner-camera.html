<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Runner Camera</title>
  <style>
    :root { color-scheme: dark; font-family: Arial, sans-serif; }
    html, body { width: 100%; height: 100%; }
    body {
      margin: 0;
      background: #090b10;
      color: #f4f7ff;
      overflow: hidden;
      font-size: 11px;
    }
    .wrap {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: contain;
      background: #05060a;
    }
    .bar {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      padding: 6px 8px;
      background: #151923;
      border-top: 1px solid rgba(255,255,255,.12);
      min-width: 0;
    }
    .pill {
      border-radius: 999px;
      padding: 3px 6px;
      background: #2a3040;
      font-weight: 800;
      white-space: nowrap;
      line-height: 1.25;
    }
    .ok { color: #8cffb3; }
    .bad { color: #ff9f9f; }
    .grow {
      flex: 1 1 160px;
      min-width: 0;
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
      line-height: 1.25;
      opacity: .78;
    }
    .web-controls { display: none; }

    @media (max-width: 360px) {
      .grow { flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <video id="preview" autoplay muted playsinline></video>
    <div class="bar">
      <span id="state" class="pill">starting</span>
      <span id="runner" class="pill"></span>
      <span id="peers" class="pill">0 viewers</span>
      <span id="message" class="grow">Preparing camera...</span>
      <span class="web-controls">
        <button id="restartBtn">Restart</button>
        <button id="stopBtn">Stop</button>
      </span>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const hash = new URLSearchParams(location.hash.replace(/^#/, ""));

    const runId = params.get("runId") || "local-test-run";
    const runnerId = params.get("runnerId") || "runner-1";
    const attemptId = params.get("attemptId") || "";
    const runKey = hash.get("runKey") || params.get("runKey") || "";
    const clientId = `camera-${runnerId}-${crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(16).slice(2)}`;

    const previewEl = document.getElementById("preview");
    const stateEl = document.getElementById("state");
    const runnerEl = document.getElementById("runner");
    const peersEl = document.getElementById("peers");
    const messageEl = document.getElementById("message");
    const restartBtn = document.getElementById("restartBtn");
    const stopBtn = document.getElementById("stopBtn");

    let iceServers = [{ urls: "stun:stun.l.google.com:19302" }];
    let iceTransportPolicy = "all";
    let iceServersPromise = null;
    const peers = new Map();
    const processingOffers = new Set();

    let stream = null;
    let heartbeatTimer = null;
    let offerPollTimer = null;
    let pollOffersInProgress = false;
    let started = false;

    runnerEl.textContent = runnerId;

    function notifyHost() {
      try {
        if (window.chrome?.webview?.postMessage) {
          window.chrome.webview.postMessage({
            type: "cameraStatus",
            state: stateEl.textContent,
            message: messageEl.textContent,
            viewers: peers.size
          });
        }
      } catch {
        // Host bridge is optional.
      }
    }

    function setState(text, ok = false) {
      stateEl.textContent = text;
      stateEl.classList.toggle("ok", ok);
      stateEl.classList.toggle("bad", !ok && text !== "starting");
      notifyHost();
    }

    function setMessage(text) {
      messageEl.textContent = text;
      notifyHost();
    }

    function accessHeaders() {
      const headers = { "Content-Type": "application/json" };
      if (runKey) headers["X-Run-Key"] = runKey;
      return headers;
    }

    function mediaUrl(path) {
      return `/api/runs/${encodeURIComponent(runId)}/media/runners/${encodeURIComponent(runnerId)}${path}`;
    }

    function runMediaUrl(path) {
      return `/api/runs/${encodeURIComponent(runId)}/media${path}`;
    }

    async function ensureIceServers() {
      if (iceServersPromise) {
        return await iceServersPromise;
      }

      iceServersPromise = (async () => {
        try {
          const response = await fetch(runMediaUrl("/ice-servers"), {
            headers: accessHeaders(false),
            cache: "no-store"
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const result = await response.json();

          if (Array.isArray(result.iceServers) && result.iceServers.length > 0) {
            iceServers = result.iceServers;
          }

          iceTransportPolicy = result.iceTransportPolicy === "relay" ? "relay" : "all";
        } catch {
          iceServers = [{ urls: "stun:stun.l.google.com:19302" }];
          iceTransportPolicy = "all";
        }

        return iceServers;
      })();

      return await iceServersPromise;
    }

    function createPeerConnection() {
      return new RTCPeerConnection({ iceServers, iceTransportPolicy });
    }

    async function postJson(path, payload) {
      const response = await fetch(mediaUrl(path), {
        method: "POST",
        headers: accessHeaders(),
        body: JSON.stringify(payload || {})
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return await response.json().catch(() => null);
    }

    async function getJson(path) {
      const response = await fetch(mediaUrl(path), {
        headers: accessHeaders(),
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return await response.json();
    }

    function waitForIceGatheringComplete(pc) {
      if (pc.iceGatheringState === "complete") {
        return Promise.resolve();
      }

      return new Promise(resolve => {
        const timeout = setTimeout(resolve, 4000);

        pc.addEventListener("icegatheringstatechange", () => {
          if (pc.iceGatheringState === "complete") {
            clearTimeout(timeout);
            resolve();
          }
        });
      });
    }

    function closePeer(viewerId) {
      const pc = peers.get(viewerId);
      if (pc) {
        pc.close();
        peers.delete(viewerId);
      }
      peersEl.textContent = `${peers.size} viewer${peers.size === 1 ? "" : "s"}`;

      if (stateEl.textContent === "online" && peers.size === 0) {
        setMessage("Camera online. Waiting for OBS/viewer...");
      }
      notifyHost();
    }

    async function handleOffer(offer) {
      if (!stream || !offer?.viewerId || processingOffers.has(offer.viewerId)) return;

      processingOffers.add(offer.viewerId);

      try {
        closePeer(offer.viewerId);

        const pc = createPeerConnection();
        peers.set(offer.viewerId, pc);
        peersEl.textContent = `${peers.size} viewer${peers.size === 1 ? "" : "s"}`;
        notifyHost();

        pc.addEventListener("connectionstatechange", () => {
          if (pc.connectionState === "connected") {
            setMessage("OBS/viewer connected.");
          }

          if (["failed", "closed", "disconnected"].includes(pc.connectionState)) {
            closePeer(offer.viewerId);
          }
        });

        for (const track of stream.getVideoTracks()) {
          pc.addTrack(track, stream);
        }

        await pc.setRemoteDescription({ type: "offer", sdp: offer.offerSdp });
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await waitForIceGatheringComplete(pc);

        await postJson("/answers", {
          viewerId: offer.viewerId,
          answerSdp: pc.localDescription.sdp
        });

        setMessage("OBS/viewer connecting...");
      } finally {
        processingOffers.delete(offer.viewerId);
        peersEl.textContent = `${peers.size} viewer${peers.size === 1 ? "" : "s"}`;
        notifyHost();
      }
    }

    async function pollOffers() {
      if (!started || !stream || pollOffersInProgress) return;

      pollOffersInProgress = true;

      try {
        const result = await getJson("/offers/pending");
        for (const offer of result.offers || []) {
          try {
            await handleOffer(offer);
          } catch (error) {
            setMessage(`Offer failed: ${error.message}`);
            closePeer(offer.viewerId);
          }
        }
      } catch (error) {
        setMessage(`Offer poll failed: ${error.message}`);
      } finally {
        pollOffersInProgress = false;
      }
    }

    function isWrongAttemptResponse(result) {
      return result?.accepted === false &&
        (result?.error === "wrong_attempt" || result?.error === "missing_attempt_id");
    }

    function stopForWrongAttempt(result) {
      resetLocalCameraState();
      setState("stopped", false);
      setMessage(
        result?.error === "missing_attempt_id"
          ? "Camera stopped: missing attempt id. Reconnect runner."
          : "Camera stopped: new attempt was created. Reconnect runner.");
    }

    async function heartbeat(status = "online") {
      try {
        const result = await postJson("/camera-heartbeat", {
          attemptId,
          clientId,
          status,
          viewerCount: peers.size
        });

        if (isWrongAttemptResponse(result)) {
          stopForWrongAttempt(result);
          return false;
        }

        return true;
      } catch (error) {
        setMessage(`Heartbeat failed: ${error.message}`);
        return true;
      }
    }

    function formatCameraError(error) {
      const name = String(error?.name || "");
      const message = String(error?.message || "");
      const text = `${name} ${message}`.toLowerCase();

      if (text.includes("denied") || text.includes("notallowed") || text.includes("permission")) {
        return "Camera permission blocked. Check Windows privacy settings.";
      }

      if (text.includes("notfound") || text.includes("device not found")) {
        return "Camera not found.";
      }

      if (text.includes("notreadable") || text.includes("could not start")) {
        return "Camera is busy in another app.";
      }

      return message || "Camera failed.";
    }

    function resetLocalCameraState() {
      started = false;
      clearInterval(heartbeatTimer);
      clearInterval(offerPollTimer);
      heartbeatTimer = null;
      offerPollTimer = null;
      pollOffersInProgress = false;
      processingOffers.clear();

      for (const viewerId of Array.from(peers.keys())) {
        closePeer(viewerId);
      }

      if (stream) {
        for (const track of stream.getTracks()) {
          track.stop();
        }
      }

      stream = null;
      previewEl.srcObject = null;
      peersEl.textContent = "0 viewers";
      notifyHost();
    }

    async function startCamera() {
      resetLocalCameraState();
      started = true;
      setState("starting");
      setMessage("Requesting camera...");

      try {
        setMessage("Loading camera network config...");
        await ensureIceServers();

        setMessage("Requesting camera...");
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30, max: 30 }
          },
          audio: false
        });

        previewEl.srcObject = stream;
        setState("online", true);
        setMessage("Camera online. Waiting for OBS/viewer.");

        const heartbeatAccepted = await heartbeat("online");

        if (!heartbeatAccepted || !started) {
          return;
        }

        heartbeatTimer = setInterval(() => heartbeat("online"), 2000);
        offerPollTimer = setInterval(pollOffers, 1000);
        await pollOffers();
      } catch (error) {
        started = false;
        clearInterval(heartbeatTimer);
        clearInterval(offerPollTimer);
        heartbeatTimer = null;
        offerPollTimer = null;

        if (stream) {
          for (const track of stream.getTracks()) {
            track.stop();
          }
        }

        stream = null;
        previewEl.srcObject = null;
        peersEl.textContent = "0 viewers";
        setState("error", false);
        setMessage(formatCameraError(error));
        await heartbeat("error");
      }
    }

    function stopCamera(notify = true) {
      resetLocalCameraState();
      setState("stopped", false);
      setMessage("Camera stopped.");

      if (notify) {
        fetch(mediaUrl("/camera-stop"), {
          method: "POST",
          headers: accessHeaders(),
          keepalive: true
        }).catch(() => {});
      }
    }

    restartBtn.addEventListener("click", startCamera);
    stopBtn.addEventListener("click", () => stopCamera(true));
    window.addEventListener("beforeunload", () => stopCamera(true));

    startCamera();
  </script>
</body>
</html>
